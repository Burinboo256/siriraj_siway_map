<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>SiWay Demo - Hospital Wayfinding</title>
  <meta name="description" content="Mobile-first hospital/campus wayfinding demo for elderly users" />
  <style>
    :root{
      --bg:#f8fafc; --card:#fff; --text:#0f172a; --muted:#64748b; --line:#e2e8f0;
      --blue:#1d4ed8; --blue2:#eff6ff; --red:#dc2626; --green:#047857; --amber:#b45309;
      --shadow:0 10px 28px rgba(15,23,42,.10); --r:28px;
    }
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:17px}
    body.large{font-size:20px}.app{max-width:460px;margin:0 auto;min-height:100vh;padding-bottom:150px}.top{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
    .top-inner{display:flex;align-items:center;gap:12px;padding:12px 16px}.logo,.back,.home-btn{width:50px;height:50px;border-radius:18px;display:grid;place-items:center;border:0;font-size:24px}.logo{background:var(--blue);color:#fff}.back,.home-btn{background:#fff;border:1px solid #cbd5e1;color:var(--text)}
    .title{font-size:22px;font-weight:900;line-height:1.1}.subtitle{font-size:13px;color:var(--muted);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.content{padding:16px}.hero{border-radius:34px;background:linear-gradient(135deg,#1e3a8a,#2563eb);color:#fff;padding:22px;box-shadow:var(--shadow)}
    .hero h1{margin:0;font-size:34px;line-height:1;font-weight:1000}.hero p{margin:10px 0 0;color:#dbeafe;font-weight:650;line-height:1.45}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:0 4px 18px rgba(15,23,42,.06);padding:16px;margin-top:16px}.label{font-size:18px;font-weight:900;margin-bottom:10px}.search-row{display:flex;gap:8px}.input-wrap{position:relative;flex:1}.input-wrap span{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:22px;color:#94a3b8}.search-input{height:64px;width:100%;border-radius:24px;border:2px solid #cbd5e1;background:#f8fafc;padding:0 14px 0 48px;font-size:20px;font-weight:800;outline:none}.search-input:focus{border-color:var(--blue)}
    button{font-family:inherit}.btn{height:58px;border:0;border-radius:24px;padding:0 18px;font-size:18px;font-weight:950;cursor:pointer}.btn:active,.quick:active,.place-card:active{transform:scale(.985)}.btn-blue{background:var(--blue);color:#fff;box-shadow:0 8px 18px rgba(29,78,216,.25)}.btn-outline{background:#fff;border:2px solid #cbd5e1;color:var(--text)}.btn-soft{background:#eff6ff;border:2px solid #bfdbfe;color:#1e40af;width:100%;display:flex;align-items:center;justify-content:center;gap:10px}.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.quick{min-height:100px;border:1px solid var(--line);background:#fff;border-radius:26px;box-shadow:0 4px 14px rgba(15,23,42,.05);font-size:18px;font-weight:950;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}.quick .icon{font-size:32px}.section-title{font-size:24px;font-weight:1000;margin:22px 0 10px}.toggle{display:flex;justify-content:space-between;align-items:center;gap:12px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:28px;padding:16px;margin-top:16px}.toggle-title{font-size:18px;font-weight:950;color:#172554}.toggle-sub{font-size:14px;color:#1d4ed8;font-weight:650}.switch{width:58px;height:32px;border-radius:99px;background:#cbd5e1;padding:4px;transition:.2s;flex:0 0 auto}.switch.on{background:var(--blue)}.knob{width:24px;height:24px;background:#fff;border-radius:50%;transition:.2s}.switch.on .knob{transform:translateX(26px)}.notice{background:#fffbeb;border:1px solid #fde68a;border-radius:28px;color:#78350f;padding:16px;margin-top:16px;font-weight:700;line-height:1.45}.place-card{background:#fff;border:1px solid var(--line);border-radius:30px;padding:16px;margin-top:12px;box-shadow:0 4px 14px rgba(15,23,42,.05)}.place-head{display:flex;gap:14px}.place-icon{width:64px;height:64px;border-radius:24px;background:var(--blue2);display:grid;place-items:center;font-size:32px;flex:0 0 auto}.place-name{font-size:21px;font-weight:1000;line-height:1.2}.place-en{font-size:15px;color:var(--muted);font-weight:700;margin-top:2px}.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}.chip{font-size:13px;font-weight:850;background:#f1f5f9;border-radius:99px;padding:5px 10px}.place-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.fixed-help{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);width:min(428px,calc(100% - 32px));height:60px;border-radius:26px;background:var(--red);color:#fff;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:10px;font-size:19px;font-weight:1000;box-shadow:0 18px 40px rgba(220,38,38,.28);z-index:40}.bottom-nav{position:fixed;left:50%;bottom:86px;transform:translateX(-50%);width:min(428px,calc(100% - 32px));background:#fff;border:1px solid var(--line);border-radius:28px;padding:8px;box-shadow:var(--shadow);z-index:30}.bottom-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}.nav-btn{height:52px;border:0;background:transparent;border-radius:22px;font-weight:950;color:#475569}.nav-btn.active{background:var(--blue);color:#fff}.hero-img{height:190px;background:linear-gradient(135deg,#dbeafe,#bfdbfe);border-radius:28px 28px 0 0;display:grid;place-items:center;font-size:64px}.detail-card{overflow:hidden;padding:0}.detail-body{padding:18px}.detail-name{font-size:31px;font-weight:1000;line-height:1.08}.detail-en{font-size:18px;color:var(--muted);font-weight:750;margin-top:4px}.detail-desc{font-size:18px;color:#334155;font-weight:650;line-height:1.55}.info-row{display:flex;gap:12px;background:#f8fafc;border-radius:24px;padding:14px;margin-top:10px}.info-icon{font-size:24px}.info-label{font-size:12px;font-weight:1000;color:#64748b;text-transform:uppercase}.info-value{font-size:18px;font-weight:900}.mapbox{height:300px;border-radius:30px;background:#f1f5f9;border:1px solid var(--line);position:relative;overflow:hidden;box-shadow:inset 0 2px 20px rgba(15,23,42,.07)}.mapbox svg{position:absolute;inset:0;width:100%;height:100%}.map-label{position:absolute;left:14px;top:14px;background:rgba(255,255,255,.95);border-radius:16px;padding:8px 10px;font-size:14px;font-weight:1000;box-shadow:0 4px 12px rgba(15,23,42,.08)}.map-note{position:absolute;left:14px;right:14px;bottom:14px;background:rgba(255,255,255,.96);border-radius:18px;padding:12px;font-weight:850}.select{height:56px;width:100%;border-radius:24px;border:2px solid #cbd5e1;background:#fff;padding:0 14px;font-size:18px;font-weight:850}.step{background:#fff;border:1px solid var(--line);border-radius:30px;padding:16px;margin-top:12px;display:flex;gap:14px;box-shadow:0 4px 14px rgba(15,23,42,.05)}.step-no{width:52px;height:52px;border-radius:20px;background:var(--blue);color:#fff;font-size:22px;font-weight:1000;display:grid;place-items:center;flex:0 0 auto}.step-text{font-size:20px;font-weight:950;line-height:1.45}.speak{margin-top:10px;border:0;background:#f1f5f9;border-radius:16px;padding:8px 12px;font-weight:950}.admin-tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;background:#fff;border:1px solid var(--line);border-radius:28px;padding:8px;margin-top:16px}.admin-tab{height:62px;border:0;border-radius:20px;background:transparent;color:#475569;font-weight:950}.admin-tab.active{background:var(--blue);color:#fff}.admin-row{display:flex;gap:12px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:28px;padding:14px;margin-top:10px;box-shadow:0 4px 14px rgba(15,23,42,.05)}.admin-main{min-width:0;flex:1}.admin-title{font-size:18px;font-weight:1000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.admin-sub{font-size:13px;color:var(--muted);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.hidden{display:none!important}.svg-map-large{height:520px}.pin{position:absolute;width:42px;height:42px;border-radius:50%;border:3px solid #fff;background:var(--blue);color:#fff;display:grid;place-items:center;font-size:20px;box-shadow:0 10px 18px rgba(15,23,42,.22);transform:translate(-50%,-50%)}
    .mapbox{aspect-ratio:1314/1222;height:auto}
    .mapbox svg{position:absolute;inset:0;width:100%;height:100%}
    .map-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center}
    .svg-map-large{height:auto}
  </style>
</head>
<body>
  <div class="app">
    <header class="top"><div class="top-inner" id="header"></div></header>
    <main id="app" class="content"></main>
  </div>
  <nav class="bottom-nav"><div class="bottom-grid">
    <button class="nav-btn" data-page="home">🏠 หน้าแรก</button>
    <button class="nav-btn" data-page="map">📍 แผนที่</button>
    <button class="nav-btn" data-page="admin">✏️ Admin</button>
  </div></nav>
  <a class="fixed-help" href="tel:020000000">☎️ โทรถามเจ้าหน้าที่</a>
<script>

let places=[];
let startNodes=[];
let routeSteps={default:['เริ่มจากจุดหลักที่ใกล้ที่สุดบนแผนที่','เดินตามทางหลักและป้ายอาคาร','หากไม่แน่ใจให้สอบถามจุดประชาสัมพันธ์']};
let quick=[['OPD','opd','🏥'],['ห้องยา','ยา','💊'],['เจาะเลือด','เจาะเลือด','🧪'],['ห้องน้ำ','ห้องน้ำ','🚻'],['ลิฟต์','ลิฟต์','🛗'],['ที่จอดรถ','parking','🚗'],['รถรับส่ง','shuttle','🚌'],['ถามทาง','ประชาสัมพันธ์','ℹ️']];
let state={page:'home',history:[],query:'',selected:null,large:false,from:'',accessible:true,adminTab:'places'};
const $=s=>document.querySelector(s);function norm(t){return String(t||'').toLowerCase().replace(/\s+/g,'').trim()}function score(p,q){q=norm(q);if(!q)return 1;let fields=[p.name_th,p.name_en,p.category,p.building,p.floor,p.nearby_landmark,...p.aliases].map(norm),s=0;for(const f of fields){if(f===q)s+=100;if(f.includes(q))s+=40;if(q.includes(f)&&f.length>1)s+=20;for(const c of q)if(f.includes(c))s+=1}return s}function results(){return places.map(p=>({p,s:score(p,state.query)})).filter(x=>x.s>0).sort((a,b)=>b.s-a.s).map(x=>x.p)}
function goto(page){state.history.push(state.page);state.page=page;render()}function home(){state.history=[];state.page='home';render()}function back(){state.page=state.history.pop()||'home';render()}function search(q){state.query=q||'';goto('search')}function openPlace(id,nav=false){if(!places.length)return;state.selected=places.find(p=>p.id===id)||places[0];goto(nav?'navigate':'detail')}function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
async function loadData(){try{const res=await fetch('data/siriraj_data_location.json',{cache:'no-store'});if(!res.ok)throw new Error('http '+res.status);const data=await res.json();places=Array.isArray(data.places)?data.places:[];startNodes=Array.isArray(data.startNodes)?data.startNodes:[];routeSteps=(data.routeSteps&&typeof data.routeSteps==='object')?data.routeSteps:routeSteps;quick=Array.isArray(data.quick)?data.quick:quick;}catch(err){console.error('loadData failed',err);}if(!state.selected&&places.length)state.selected=places[0];if(!state.from&&startNodes.length)state.from=startNodes[0].id;}
function header(){const titles={home:'SiWay',search:'ค้นหาสถานที่',detail:'รายละเอียดสถานที่',navigate:'นำทาง',map:'แผนที่',admin:'จัดการข้อมูล'};$('#header').innerHTML=`${state.page==='home'?'<div class="logo">🧭</div>':'<button class="back" onclick="back()">←</button>'}<div style="min-width:0;flex:1"><div class="title">${titles[state.page]}</div><div class="subtitle">ค้นหาสถานที่และนำทางในโรงพยาบาล</div></div>${state.page==='home'?'':'<button class="home-btn" onclick="home()">🏠</button>'}`;document.body.classList.toggle('large',state.large);document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.page===state.page));}
function placeCard(p){const canNav=Number.isFinite(p.map_x)&&Number.isFinite(p.map_y);return `<div class="place-card"><div class="place-head"><div class="place-icon">${p.icon}</div><div style="min-width:0;flex:1"><div class="place-name">${esc(p.name_th)}</div><div class="place-en">${esc(p.name_en)}</div><div class="chips"><span class="chip">${esc(p.building)}</span><span class="chip">${esc(p.floor)}</span></div><p style="color:#475569;font-weight:650;line-height:1.45;margin:10px 0 0">${esc(p.nearby_landmark)}</p></div></div><div class="place-actions"><button class="btn btn-outline" onclick="openPlace('${p.id}')">ดูรายละเอียด</button><button class="btn ${canNav?'btn-blue':'btn-outline'}" ${canNav?`onclick="openPlace('${p.id}',true)"`:'disabled'}>${canNav?'นำทาง':'ไม่มีพิกัด'}</button></div></div>`}
function homePage(){return `<div class="hero"><div style="display:flex;gap:14px;align-items:flex-start"><div style="font-size:38px">📍</div><div><h1>จะไปที่ไหน?</h1><p>พิมพ์หรือกดพูดชื่ออาคาร แผนก ห้องน้ำ ลิฟต์ หรือที่จอดรถ</p></div></div></div><div class="card"><div class="label">ค้นหาสถานที่</div><div class="search-row"><div class="input-wrap"><span>🔍</span><input id="q" class="search-input" placeholder="เช่น ห้องยา, OPD, ห้องน้ำ" onkeydown="if(event.key==='Enter')search(this.value)"></div><button class="btn btn-blue" onclick="search($('#q').value)">หา</button></div><button class="btn btn-soft" style="margin-top:12px">🎤 กดเพื่อพูดชื่อสถานที่</button></div><div class="section-title">ปุ่มด่วน</div><div class="quick-grid">${quick.map(x=>`<button class="quick" onclick="search('${x[1]}')"><span class="icon">${x[2]}</span>${x[0]}</button>`).join('')}</div><div class="toggle" onclick="state.large=!state.large;render()"><div><div class="toggle-title">โหมดตัวอักษรใหญ่</div><div class="toggle-sub">เหมาะสำหรับผู้สูงอายุและผู้ใช้มือถือไม่ถนัด</div></div><div class="switch ${state.large?'on':''}"><div class="knob"></div></div></div><div class="notice">📱 <b>สแกน QR เพื่อรู้ตำแหน่งปัจจุบัน</b><br>ติด QR ไว้ที่ประตู ลิฟต์ และจุดประชาสัมพันธ์ ผู้ใช้ไม่ต้องเลือกจุดเริ่มต้นเอง</div><div class="section-title">สถานที่ยอดนิยม</div>${places.slice(0,3).map(placeCard).join('')}`}
function searchPage(){const r=results();return `<div class="card"><div class="search-row"><div class="input-wrap"><span>🔍</span><input id="q2" class="search-input" value="${esc(state.query)}" onkeydown="if(event.key==='Enter')search(this.value)"></div><button class="btn btn-blue" onclick="search($('#q2').value)">หา</button></div></div><div class="section-title">ผลการค้นหา</div><p style="color:#64748b;font-weight:700;margin-top:-6px">พบ ${r.length} รายการ สำหรับ “${esc(state.query||'ทั้งหมด')}”</p>${r.length?r.map(placeCard).join(''):`<div class="card" style="text-align:center;padding:28px"><div style="font-size:50px">🔍</div><h2>ไม่พบสถานที่</h2><p style="color:#64748b;font-weight:650">ลองค้นหาด้วยคำง่าย ๆ เช่น ห้องยา, OPD, ห้องน้ำ หรือประชาสัมพันธ์</p></div>`}`}
function detailPage(){const p=state.selected;if(!p)return `<div class="card">ยังไม่มีข้อมูลสถานที่</div>`;return `<div class="card detail-card"><div class="hero-img">${p.icon||'📍'}</div><div class="detail-body"><div class="detail-name">${esc(p.name_th||'-')}</div><div class="detail-en">${esc(p.name_en||'-')}</div><p class="detail-desc">${esc(p.description||'-')}</p>${info('🏢','อาคาร',p.building||'-')}${info('🛗','ชั้น',p.floor||'-')}${info('⏰','เวลาเปิด',p.opening_hours||'-')}${info('☎️','โทร',p.phone||'-')}${info('📍','จุดสังเกต',p.nearby_landmark||'-')}${info('♿','ผู้สูงอายุ/รถเข็น',p.is_accessible?'รองรับ':'ควรถามเจ้าหน้าที่')}<button class="btn btn-blue" style="width:100%;height:66px;margin-top:16px;font-size:21px" onclick="openPlace('${p.id}',true)">🧭 เริ่มนำทาง</button><a class="btn btn-outline" style="width:100%;height:58px;margin-top:10px;text-decoration:none;display:flex;align-items:center;justify-content:center" href="tel:${p.phone||''}">☎️ โทรสอบถาม</a></div></div>`}
function info(i,l,v){return `<div class="info-row"><div class="info-icon">${i}</div><div><div class="info-label">${l}</div><div class="info-value">${esc(v)}</div></div></div>`}
function mapSvg(p,from){const fp=startNodes.find(n=>n.id===from)||startNodes[0]||{map_x:p.map_x,map_y:p.map_y};const points=`${fp.map_x},${fp.map_y} 45,62 ${p.map_x},${p.map_y}`;return `<div class="mapbox"><img class="map-photo" src="siriraj_map.png" alt="แผนที่โรงพยาบาลศิริราช"><svg viewBox="0 0 100 100" preserveAspectRatio="none"><polyline points="${points}" stroke="#1d4ed8" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><circle cx="${fp.map_x}" cy="${fp.map_y}" r="3" fill="#1d4ed8" stroke="white" stroke-width="2"/><circle cx="45" cy="62" r="3" fill="#1d4ed8" stroke="white" stroke-width="2"/><circle cx="${p.map_x}" cy="${p.map_y}" r="4" fill="#dc2626" stroke="white" stroke-width="2"/></svg><div class="map-label">แผนที่จริง</div><div class="map-note">เส้นสีน้ำเงิน = เส้นทางแนะนำ<br><span style="color:#64748b;font-size:13px">อ้างอิงจากไฟล์ siriraj_map.png</span></div></div>`}
function navPage(){const p=state.selected;if(!p)return `<div class="card">ยังไม่มีข้อมูลสถานที่</div>`;const hasCoords=Number.isFinite(p.map_x)&&Number.isFinite(p.map_y);const steps=routeSteps[p.id]||routeSteps.default;const distance=Math.round(steps.length*45+(state.accessible?35:0)),min=Math.max(2,Math.round(distance/55));if(!hasCoords){return `<div class="card" style="background:#fff7ed;border-color:#fdba74"><div style="color:#9a3412;font-weight:1000">ปลายทาง</div><div style="font-size:24px;font-weight:1000;color:#7c2d12">${esc(p.name_th)}</div><p style="color:#9a3412;font-weight:700;line-height:1.5">ยังไม่มีพิกัดแผนที่สำหรับจุดนี้ในไฟล์ข้อมูล</p></div><div class="card"><button class="btn btn-outline" style="width:100%" onclick="back()">← กลับไปผลการค้นหา</button></div>`}return `<div class="card" style="background:#eff6ff;border-color:#bfdbfe"><div style="color:#1d4ed8;font-weight:1000">ปลายทาง</div><div style="font-size:26px;font-weight:1000;color:#172554">${esc(p.name_th)}</div><div style="margin-top:8px;color:#1e40af;font-weight:850">⏰ ใช้เวลาประมาณ ${min} นาที · ${distance} เมตร</div></div><div class="card"><div class="label">คุณเริ่มจากจุดไหน?</div><select class="select" onchange="state.from=this.value;render()">${startNodes.map(n=>`<option value="${n.id}" ${state.from===n.id?'selected':''}>${n.name}</option>`).join('')}</select><div class="notice" style="margin-top:12px">ตัวอย่าง QR URL:<br>/?from=${state.from}&to=${p.id}</div></div><div class="toggle" style="background:#ecfdf5;border-color:#a7f3d0" onclick="state.accessible=!state.accessible;render()"><div><div class="toggle-title" style="color:#064e3b">เส้นทางสำหรับผู้สูงอายุ/รถเข็น</div><div class="toggle-sub" style="color:#047857">หลีกเลี่ยงบันได ใช้ลิฟต์และทางลาด</div></div><div class="switch ${state.accessible?'on':''}" style="${state.accessible?'background:#047857':''}"><div class="knob"></div></div></div><div style="margin-top:16px">${mapSvg(p,state.from)}</div><div class="section-title">เดินตามขั้นตอนนี้</div>${steps.map((s,i)=>`<div class="step"><div class="step-no">${i+1}</div><div><div class="step-text">${esc(s)}</div><button class="speak">🔊 อ่านออกเสียง</button></div></div>`).join('')}`}
function mapPage(){return `<div class="card"><div style="font-size:25px;font-weight:1000">แผนที่โรงพยาบาล</div><p style="color:#64748b;font-weight:650;line-height:1.45">ใช้ไฟล์แผนที่จริงและแตะหมุดเพื่อดูรายละเอียดสถานที่</p></div><div class="mapbox svg-map-large" style="margin-top:16px"><img class="map-photo" src="siriraj_map.png" alt="แผนที่โรงพยาบาลศิริราช">${places.filter(p=>Number.isFinite(p.map_x)&&Number.isFinite(p.map_y)).map(p=>`<button class="pin" style="left:${p.map_x}%;top:${p.map_y}%" onclick="openPlace('${p.id}')">${p.icon}</button>`).join('')}<div class="map-note">แตะหมุดเพื่อดูสถานที่<br><span style="color:#64748b;font-size:13px">ตำแหน่งหมุดอิงค่า map_x/map_y ในข้อมูลสถานที่</span></div></div>`}
function adminPage(){const tabs=[['places','สถานที่','🏢'],['aliases','คำค้น','🔍'],['nodes','จุด QR','📱'],['routes','เส้นทาง','🧭']];let rows='';if(state.adminTab==='places')rows=places.map(p=>adminRow('🏢',p.name_th,`${p.building} · ${p.floor}`,'แก้ไข')).join('');if(state.adminTab==='aliases')rows=places.slice(0,4).map(p=>adminRow('🔍',p.name_th,p.aliases.join(', '),'จัดการ')).join('');if(state.adminTab==='nodes')rows=startNodes.map(n=>adminRow('📱',n.name,`type: ${n.type} · QR: ${n.id}`,'QR')).join('');if(state.adminTab==='routes')rows=places.slice(0,5).map(p=>adminRow('🧭',`ไป ${p.name_th}`,`${(routeSteps[p.id]||routeSteps.default).length} ขั้นตอน · รองรับเส้นทางผู้สูงอายุ`,'แก้ไข')).join('');return `<div class="hero" style="background:#0f172a"><h1 style="font-size:28px">Admin Mock</h1><p>สำหรับเจ้าหน้าที่เพิ่มข้อมูลสถานที่ เส้นทาง และ QR</p></div><div class="admin-tabs">${tabs.map(t=>`<button class="admin-tab ${state.adminTab===t[0]?'active':''}" onclick="state.adminTab='${t[0]}';render()">${t[2]}<br>${t[1]}</button>`).join('')}</div><div class="card"><button class="btn btn-blue" style="width:100%">＋ เพิ่มข้อมูลใหม่</button></div>${rows}<div class="card" style="border-style:dashed;text-align:center"><div style="font-size:44px">🖼️</div><div style="font-size:20px;font-weight:1000">Upload landmark photos</div><p style="color:#64748b;font-weight:650">พื้นที่สำหรับอัปโหลดรูปจุดเลี้ยว ป้ายอาคาร และทางเข้า</p></div>`}
function adminRow(i,t,s,r){return `<div class="admin-row"><div class="place-icon" style="width:52px;height:52px;font-size:24px">${i}</div><div class="admin-main"><div class="admin-title">${esc(t)}</div><div class="admin-sub">${esc(s)}</div></div><button class="btn btn-outline" style="height:42px;border-radius:16px;font-size:14px;padding:0 12px">${r}</button></div>`}
function render(){header();let html='';if(state.page==='home')html=homePage();if(state.page==='search')html=searchPage();if(state.page==='detail')html=detailPage();if(state.page==='navigate')html=navPage();if(state.page==='map')html=mapPage();if(state.page==='admin')html=adminPage();$('#app').innerHTML=html}document.querySelectorAll('.nav-btn').forEach(b=>b.onclick=()=>goto(b.dataset.page));
async function init(){await loadData();const params=new URLSearchParams(location.search);if(params.get('to')){const p=places.find(x=>x.id===params.get('to'));if(p){state.selected=p;state.page='navigate';state.from=params.get('from')||(startNodes[0]?.id||'')}}render();}
init();
</script>
</body>
</html>
